<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch SWF Host</title>

<script>
window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = {
    autoplay: "on",
    allowFullscreen: true,
    unmuteOverlay: "hidden",
    logLevel: "debug"
};
</script>

<script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  #wrapper {
    position: relative;
    width: 100%;
    height: 100%;
  }

  object, ruffle-player {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>

<body>

<div id="wrapper">

  <!-- This is the correct path now that the SWF downloads -->
  <object
      id="flash"
      data="/scratch-swf-host/Scratch.swf"
      type="application/x-shockwave-flash">
  </object>

</div>

</body>
</html>
