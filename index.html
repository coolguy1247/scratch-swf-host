<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch SWF Host</title>

<!-- Ruffle config -->
<script>
window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = {
    autoplay: "on",
    allowFullscreen: true,
    unmuteOverlay: "hidden",
    logLevel: "debug"
};
</script>

<!-- Ruffle polyfill -->
<script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  #wrapper {
    position: relative;
    width: 100%;
    height: 100%;
  }

  object, ruffle-player {
    width: 100%;
    height: 100%;
    display: block;
  }

  #fullscreenBtn {
    position: absolute;
    bottom: 15px;
    right: 15px;
    z-index: 9999;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 1px solid #fff;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div id="wrapper">

  <!-- IMPORTANT: ?raw=1 forces GitHub to serve the SWF as binary -->
  <object
      id="flash"
      data="Scratch.swf?raw=1"
      type="application/x-shockwave-flash">
      <param name="allowFullScreen" value="true">
  </object>

  <button id="fullscreenBtn">Fullscreen</button>
</div>

<script>
document.getElementById("fullscreenBtn").onclick = () => {
    const player = document.querySelector("ruffle-player");
    if (player && player.requestFullscreen) {
        player.requestFullscreen();
    }
};
</script>

</body>
</html>
