<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch 2.0 Editor</title>

<script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  #container {
    position: relative;
    width: 100%;
    height: 100%;
  }

  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 20px;
    text-align: center;
  }

  #spinner {
    border: 6px solid #444;
    border-top: 6px solid #fff;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    margin: 0 auto 10px auto;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  #fullscreenBtn {
    position: absolute;
    bottom: 15px;
    right: 15px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 1px solid #fff;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div id="container">
  <div id="loading">
    <div id="spinner"></div>
    Loading Scratch.swf…
  </div>
  <button id="fullscreenBtn">Fullscreen</button>
</div>

<script>
window.RufflePlayer = window.RufflePlayer || {};

window.addEventListener("DOMContentLoaded", () => {
  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();

  const container = document.getElementById("container");
  container.appendChild(player);

  console.log("Attempting to load Scratch.swf…");

  // *** THIS is the actual load call ***
  player.load("Scratch.swf").then(() => {
    console.log("SWF load promise resolved.");
    document.getElementById("loading").style.display = "none";
  }).catch(err => {
    console.error("SWF failed to load:", err);
    document.getElementById("loading").innerHTML =
      "<b style='color:red;'>Failed to load Scratch.swf</b><br>" +
      "Check the file path.<br><br>" +
      "<small>" + err + "</small>";
  });

  // Fullscreen
  document.getElementById("fullscreenBtn").onclick = () => {
    if (player.requestFullscreen) player.requestFullscreen();
  };
});
</script>

</body>
</html>
