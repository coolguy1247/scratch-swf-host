<!DOCTYPE html>
<html>
  <head>
    <title>Scratch 2.0 Editor</title>
    <link rel="icon" type="image/x-icon" href="https://guyotjs.github.io/duckclear2.png">
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      /* Fullscreen container */
      #swf-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
      }

      /* 16:9 aspect ratio */
      #aspect-box {
        width: 100vw;
        height: calc(100vw * 9 / 16);
        max-height: 100vh;
        max-width: calc(100vh * 16 / 9);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      object, ruffle-player {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>

  <body>

    <div id="swf-container">
      <div id="aspect-box">
        <object
          data="/scratch-swf-host/Scratch.swf"
          type="application/x-shockwave-flash"
        >
          <param name="allowfullscreen" value="true" />
          <param name="allowscriptaccess" value="true" />
          <param name="wmode" value="direct" />
          <param name="menu" value="false" />
        </object>
      </div>
    </div>

  </body>
</html>
