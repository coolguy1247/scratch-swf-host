<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forced Ruffle Sandbox</title>

<!-- Load Ruffle -->
<script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  #wrapper {
    position: relative;
    width: 100%;
    height: 100%;
  }

  #fullscreenBtn {
    position: absolute;
    bottom: 15px;
    right: 15px;
    z-index: 9999;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 1px solid #fff;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 14px;
  }

  object, embed, ruffle-player {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>

<body>

<div id="wrapper">

  <!-- THIS forces Ruffle to create the sandbox iframe -->
  <object id="flash" data="Scratch.swf" type="application/x-shockwave-flash">
    <param name="allowFullScreen" value="true">
  </object>

  <button id="fullscreenBtn">Fullscreen</button>
</div>

<script>
  // Fullscreen button logic
  document.getElementById("fullscreenBtn").onclick = () => {
    const player = document.querySelector("ruffle-player");

    if (!player) {
      alert("Ruffle player not initialized yet.");
      return;
    }

    if (player.requestFullscreen) {
      player.requestFullscreen();
    }
  };
</script>

</body>
</html>
